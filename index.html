<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbershop Chatbot Demo</title>

<style>

body{
background:#0f0f0f;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
color:white;
}

/* Phone frame */

.phone{
width:360px;
height:720px;
background:#000;
border-radius:40px;
box-shadow:0 0 40px rgba(0,0,0,.8);
display:flex;
flex-direction:column;
overflow:hidden;
border:3px solid #222;
}

/* Header */

.header{
background:#111;
padding:16px;
text-align:center;
font-weight:600;
border-bottom:1px solid #222;
color:#d4af37;
}

/* Chat area */

.chat{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
max-width:75%;
padding:10px 14px;
border-radius:18px;
font-size:14px;
}

.bot{
background:#1c1c1c;
align-self:flex-start;
}

.user{
background:#d4af37;
color:black;
align-self:flex-end;
}

/* Buttons */

.options{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:6px;
}

button{
border:none;
border-radius:20px;
padding:8px 14px;
background:#d4af37;
color:black;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.85;
}

/* Input */

input{
margin-top:10px;
padding:8px;
border-radius:10px;
border:none;
}

/* CTA */

.cta{
margin-top:15px;
background:#25D366;
color:white;
font-size:16px;
padding:12px;
border-radius:25px;
}

</style>
</head>

<body>

<div class="phone">

<div class="header">Ruffians Barber</div>

<div class="chat" id="chat"></div>

</div>

<script>

const chat=document.getElementById("chat")

function addBot(text){
const msg=document.createElement("div")
msg.className="message bot"
msg.innerText=text
chat.appendChild(msg)
chat.scrollTop=chat.scrollHeight
}

function addUser(text){
const msg=document.createElement("div")
msg.className="message user"
msg.innerText=text
chat.appendChild(msg)
chat.scrollTop=chat.scrollHeight
}

function addOptions(options){
const container=document.createElement("div")
container.className="options"

options.forEach(o=>{
const btn=document.createElement("button")
btn.innerText=o.text
btn.onclick=o.action
container.appendChild(btn)
})

chat.appendChild(container)
chat.scrollTop=chat.scrollHeight
}

/* FLOW */

function startChat(){
addBot("Hi! Welcome to Ruffians. Ready to book your appointment?")

addOptions([
{text:"Yes, let's book!",action:branchStep},
{text:"View Prices",action:viewPrices}
])
}

function viewPrices(){

addUser("View Prices")

addBot("Our services start from:")
addBot("Haircut – $25\nBeard Trim – $15\nFull Service – $40")

addBot("Would you like to book now?")

addOptions([
{text:"Yes, book now",action:branchStep}
])
}

function branchStep(){

addUser("Yes, let's book!")

addBot("Which branch would you like?")

addOptions([
{text:"Multiplaza",action:()=>serviceStep("Multiplaza")},
{text:"Presidente Plaza",action:()=>serviceStep("Presidente Plaza")},
{text:"La Gran Vía",action:()=>serviceStep("La Gran Vía")}
])

}

function serviceStep(branch){

addUser(branch)

addBot("Which service would you like?")

addOptions([
{text:"Haircut",action:()=>barberStep("Haircut")},
{text:"Beard Trim",action:()=>barberStep("Beard Trim")},
{text:"The Full Service",action:()=>barberStep("Full Service")}
])

}

function barberStep(service){

addUser(service)

addBot("Choose your barber")

addOptions([
{text:"Marco",action:()=>timeStep("Marco")},
{text:"Luis",action:()=>timeStep("Luis")},
{text:"Andres",action:()=>timeStep("Andres")}
])

}

function timeStep(barber){

addUser(barber)

addBot("Select a date and time")

const input=document.createElement("input")
input.type="datetime-local"

const btn=document.createElement("button")
btn.innerText="Confirm Appointment"

btn.onclick=()=>{
addUser(input.value)
confirmBooking()
}

chat.appendChild(input)
chat.appendChild(btn)

}

function confirmBooking(){

addBot("✅ Your appointment request has been received!")
addBot("A barber will confirm your booking shortly.")

const cta=document.createElement("button")
cta.className="cta"
cta.innerText="I want this for my shop"

cta.onclick=()=>{
window.open("https://wa.me/2340000000000","_blank")
}

chat.appendChild(cta)

}

/* start */

setTimeout(startChat,800)

</script>

</body>
</html>
